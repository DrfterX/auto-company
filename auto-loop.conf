# Auto Company 自动循环配置
# 使用 SenseNova — DeepSeek V4 Flash (Anthropic 协议直连)

[api]
provider=sensenova
engine=engine
api_url=https://token.sensenova.cn
model=deepseek-v4-flash

[loop]
interval=30
timeout=1800
max_errors=5

[claude]
permission_mode=bypassPermissions
allowed_tools=Bash,Edit,Read,Write,Delete,Glob,LS,Find

[audit]
target=/Users/ayong/options_arbitrage_system
output_dir=/Users/ayong/projects/auto-company_test/logs
report_format=markdown
