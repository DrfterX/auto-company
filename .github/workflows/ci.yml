name: Critiq CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/critiq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: projects/critiq/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Check wrangler validity
        run: npx wrangler --version

  critiq-self-review:
    name: 🐶 Critiq Self-Review (Dogfood)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: projects/critiq
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: projects/critiq/package-lock.json
      - run: npm ci
      - run: node build.mjs
      - name: Self-review PR diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          git diff origin/${{ github.base_ref }}...HEAD | \
          node dist/cli.js \
            --pr-title "Self-Review: ${{ github.head_ref }}" \
            --repo "DrfterX/critiq" \
            --pr-number ${{ github.event.pull_request.number }} \
            --json
        env:
          CRITIQ_API_KEY: ${{ secrets.CRITIQ_API_KEY }}
          CRITIQ_API_BASE: ${{ secrets.CRITIQ_API_BASE || 'https://api-inference.modelscope.cn/v1' }}
          CRITIQ_MODEL: ${{ secrets.CRITIQ_MODEL || 'deepseek-ai/DeepSeek-V4-Flash' }}